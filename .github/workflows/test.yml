name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-inmemory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet test --configuration Release --logger "trx;LogFileName=results.trx"
        env:
          BIGQUERY_TEST_TARGET: inmemory
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-inmemory
          path: '**/*.trx'

  test-emulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Start BigQuery emulator
        run: |
          docker run -d --name bq-emulator -p 9050:9050 --memory=2g --restart=on-failure:5 \
            ghcr.io/goccy/bigquery-emulator:0.6.6 --project=test-project
          # Wait for emulator to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9050/bigquery/v2/projects/test-project/datasets > /dev/null 2>&1; then
              echo "Emulator ready"
              break
            fi
            sleep 1
          done
      - name: Run tests
        run: |
          dotnet test --configuration Release \
            --filter "Target!=InMemoryOnly&Target!=CloudOnly&Target!=EmulatorDivergence" \
            --logger "trx;LogFileName=results.trx" \
            -- RunConfiguration.MaxCpuCount=1
        env:
          BIGQUERY_TEST_TARGET: emulator
          BIGQUERY_EMULATOR_EXTERNAL: "true"
      - name: Emulator logs on failure
        if: failure()
        run: docker logs bq-emulator 2>&1 | tail -1000
      - name: Emulator container status
        if: failure()
        run: docker inspect bq-emulator --format='{{.State.Status}} ExitCode={{.State.ExitCode}} OOMKilled={{.State.OOMKilled}} RestartCount={{.RestartCount}}'
      - name: Stop emulator
        if: always()
        run: docker rm -f bq-emulator || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-emulator
          path: '**/*.trx'

